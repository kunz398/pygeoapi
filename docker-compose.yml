services:
  pygeoapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pygeoapi-standalone
    ports:
      - "5003:5000"
    environment:
      PYGEOAPI_CONFIG: /app/pygeoapi-generate-config/pygeoapi-config.yml
      PYGEOAPI_OPENAPI: /app/pygeoapi-generate-config/openapi.yml
      PYGEOAPI_SERVER_URL: https://opmthredds.gem.spc.int/pygeoapi/
    volumes:
      - ./pygeoapi-generate-config:/app/pygeoapi-generate-config
      - ./logs:/app/logs
    restart: unless-stopped
